<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booksbot Library</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Booksbot Library</p>
          <h1>Scraped Book Catalogue</h1>
        </div>
        <div class="summary-strip" aria-label="Catalogue summary">
          <div>
            <span id="totalBooks">0</span>
            <small>books</small>
          </div>
          <div>
            <span id="totalCategories">0</span>
            <small>categories</small>
          </div>
          <div>
            <span id="averagePrice">0</span>
            <small>avg price</small>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="Catalogue controls">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Title, category, or description">
        </label>

        <label>
          <span>Category</span>
          <select id="categorySelect">
            <option value="all">All categories</option>
          </select>
        </label>

        <label>
          <span>Sort</span>
          <select id="sortSelect">
            <option value="title-asc">Title A-Z</option>
            <option value="price-asc">Price low-high</option>
            <option value="price-desc">Price high-low</option>
            <option value="category-asc">Category A-Z</option>
          </select>
        </label>
      </section>

      <section class="insights" aria-label="Catalogue insights">
        <div class="chart-panel">
          <div class="section-heading">
            <h2>Category Mix</h2>
            <p id="visibleCount">Showing 0 books</p>
          </div>
          <div id="categoryBars" class="category-bars"></div>
        </div>
        <div class="spotlight-panel">
          <div class="section-heading">
            <h2>Spotlight</h2>
            <p id="spotlightCategory">All categories</p>
          </div>
          <div id="spotlightBook" class="spotlight-book"></div>
        </div>
      </section>

      <section class="results-head" aria-label="Results heading">
        <h2>Results</h2>
        <button id="resetButton" type="button">Reset</button>
      </section>

      <section id="bookGrid" class="book-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state" hidden>No books match the current filters.</p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
